name: Rail Lifecycle CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile C++ braking model
        run: |
          mkdir -p generated
          g++ simulation/braking_model.cpp -std=c++17 -O2 -o generated/braking_model

      - name: Generate simulation evidence
        run: ./generated/braking_model

      - name: Run Python lifecycle tests
        run: JIRA_DRY_RUN=true python -m unittest discover -s tests

      - name: Upload simulation evidence
        uses: actions/upload-artifact@v4
        with:
          name: simulation-results
          path: generated/simulation-results.json
